<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | FarmFeed</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 50px 30px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: white;
    }

    .login-header h1 {
      font-size: 30px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #999;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-control:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
      font-size: 18px;
      border: none;
      background: none;
      padding: 0;
    }

    .password-toggle:hover {
      color: #667eea;
    }

    .password-wrapper {
      position: relative;
    }

    .btn-login {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #c33;
      display: none;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .success-message {
      background: #efe;
      color: #393;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #393;
      display: none;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      margin: 20px 0;
    }

    .remember-me input {
      margin-right: 8px;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .remember-me label {
      margin: 0;
      cursor: pointer;
      font-size: 13px;
      color: #666;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }

    .login-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .forgot-password {
      text-align: right;
      margin-top: 8px;
    }

    .forgot-password a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="logo-icon">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h1>Admin Portal</h1>
        <p>Manage vendors and inventory</p>
      </div>

      <!-- Messages -->
      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Username/Email -->
        <div class="form-group">
          <label class="form-label" for="username">
            <i class="bi bi-person"></i> Username
          </label>
          <input 
            type="text" 
            id="username" 
            class="form-control" 
            placeholder="Enter username"
            required
            autocomplete="off"
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">
            <i class="bi bi-lock"></i> Password
          </label>
          <div class="password-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              placeholder="Enter password"
              required
              autocomplete="off"
            />
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
              <i class="bi bi-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="remember-me">
          <input type="checkbox" id="rememberMe" />
          <label for="rememberMe">Remember me for 30 days</label>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </button>

        <!-- Forgot Password -->
        <div class="forgot-password">
          <a href="#" onclick="showDefaultCredentials(); return false;">Need help?</a>
        </div>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>Secure admin authentication</p>
        <p style="margin-top: 12px; font-size: 13px;">
          Don't have an account? <a href="AdminSignup.html">Sign up here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    const ADMIN_CREDENTIALS = {
      username: "admin",
      password: "admin123"
    };

    window.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem("admin_session")) {
        window.location.href = "AdminDashboard.html";
      }
    });

    function togglePasswordVisibility() {
      const pwd = document.getElementById("password");
      const icon = document.getElementById("toggleIcon");

      if (pwd.type === "password") {
        pwd.type = "text";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
      } else {
        pwd.type = "password";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
      }
    }

    function showMessage(msg, type = "error") {
      const el = type === "error" 
        ? document.getElementById("errorMessage")
        : document.getElementById("successMessage");
      
      el.textContent = msg;
      el.classList.add("show");

      setTimeout(() => el.classList.remove("show"), 5000);
    }

    async function handleLogin(event) {
      event.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const rememberMe = document.getElementById("rememberMe").checked;
      const btn = document.getElementById("loginBtn");

      btn.disabled = true;
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<span class="loader"></span> Logging in...';

      setTimeout(() => {
        let success = false;
        let name = username;

        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
          success = true;
          name = "Admin";
        } else {
          const admins = JSON.parse(localStorage.getItem("admins")) || [];
          const admin = admins.find(a => (a.username === username || a.email === username) && a.password === password);
          if (admin) {
            success = true;
            name = admin.fullName;
          }
        }

        if (success) {
          const session = {
            username: username,
            fullName: name,
            timestamp: new Date().getTime(),
            rememberMe: rememberMe
          };

          // Store session
          localStorage.setItem("admin_session", JSON.stringify(sessionData));
          localStorage.setItem("admin_username", username);

          // Show success message
          showMessage("✓ Welcome " + fullName + "! Redirecting...", "success");

          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = "AdminDashboard.html";
          }, 1000);
        } else {
          // Show error
          showMessage("✗ Invalid username/email or password", "error");

          // Reset button
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalHTML;

          // Clear password
          document.getElementById("password").value = "";
          document.getElementById("password").focus();
        }
      }, 500);
    }

    function showDefaultCredentials() {
      alert(`
Admin Credentials:
─────────────────
Username: admin
Password: admin123

Change these credentials in production!
      `);
    }

    // Allow Enter key to submit form
    document.getElementById("loginForm").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        handleLogin(e);
      }
    });
  </script>
</body>
</html>
