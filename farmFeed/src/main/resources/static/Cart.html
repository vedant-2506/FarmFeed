<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart | farmFeed</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <!-- <link rel="stylesheet" href="Cart.css" /> -->
   <link rel="stylesheet" href="css/Cart.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="Home.html">
        <img src="logo.png" alt="logo" height="40">
      </a>
      <span class="navbar-text text-success fw-bold">My Cart</span>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a href="Home.html" class="btn btn-outline-success btn-sm">← Back to Shop</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5"></i>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow p-3">
            <li class="mb-2">
              <a href="FarmerAccount.html" class="btn btn-outline-success w-100 btn-sm">
                <i class="bi bi-person"></i> My Account
              </a>
            </li>
            <li>
              <button class="btn btn-outline-danger w-100 btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Logout
              </button>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Background Carousel -->
  <div id="bgCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://thumbs.dreamstime.com/b/agriculture-vegetable-field-landscape-view-freshly-growing-84090367.jpg" class="d-block w-100" alt="Farm" />
      </div>
      <div class="carousel-item">
        <img src="https://img.freepik.com/premium-photo/indian-farmer-cotton-field_54391-2206.jpg" class="d-block w-100" alt="Green Field" />
      </div>
      <div class="carousel-item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThf3m5iqw_elODOKm8sHtjp_SxmyrvEOUHvQ&s" class="d-block w-100" alt="Fertilizer" />
      </div>
      <div class="carousel-item">
        <img src="https://thumbs.dreamstime.com/b/weed-insecticide-fumigation-organic-ecological-agriculture-spray-pesticides-pesticide-fruit-lemon-growing-agricultural-167279928.jpg" class="d-block w-100" alt="Spraying" />
      </div>
      <div class="carousel-item">
        <img src="https://kj1bcdn.b-cdn.net/media/39201/farmer-applying-fertilizer.jpg" class="d-block w-100" alt="Farmer" />
      </div>
    </div>
  </div>

  <!-- Cart Container -->
  <div class="cart-container py-5">
    <div class="cart-card shadow-lg mx-auto">
      <h2 class="text-center text-success mb-4">
        <i class="bi bi-cart4"></i> Your Shopping Cart
      </h2>

      <div id="cart-items" class="row g-4 mb-4"></div>

      <div class="text-center">
        <button id="clear-cart" class="btn btn-danger px-4 me-2">Clear Cart</button>
        <a href="Home.html" class="btn btn-success px-4">Continue Shopping</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/Cart.js"></script>
</body>
</html>
