<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmFeed | Forgot Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/ForgotPassword.css">
</head>

<body>

  <!-- FULL SCREEN CAROUSEL -->
  <div id="bgCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="https://thumbs.dreamstime.com/b/agriculture-vegetable-field-landscape-view-freshly-growing-84090367.jpg" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://img.freepik.com/premium-photo/indian-farmer-cotton-field_54391-2206.jpg" class="d-block w-100">
      </div>

      <div class="carousel-item">
        <img src="https://kj1bcdn.b-cdn.net/media/39201/farmer-applying-fertilizer.jpg" class="d-block w-100">
      </div>

    </div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- FORGOT PASSWORD CARD -->
  <div class="forgot-container">
    <div class="forgot-card shadow">

      <h3 class="text-center text-success mb-1"> Reset Password</h3>
      <p class="text-center text-muted small mb-3">Enter your details to reset your password</p>

      <!-- Tabs — same style as Login -->
      <ul class="nav nav-pills nav-justified mb-3">
        <li class="nav-item">
          <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#farmerForgot">
            Farmer
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-bs-toggle="pill" data-bs-target="#vendorForgot">
            Vendor
          </button>
        </li>
      </ul>

      <div class="tab-content">

        <!-- FARMER RESET -->
        <div class="tab-pane fade show active" id="farmerForgot">
          <form id="farmerForgotForm">

            <div class="mb-3">
              <label class="form-label">Mobile Number</label>
              <input type="text" class="form-control" id="farmerMobile" placeholder="Enter registered phone" required>
            </div>

            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="farmerNewPassword" placeholder="New password" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="farmerConfirmPassword" placeholder="Confirm new password" required>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold">Reset Password</button>

            <div class="mt-3 text-center">
              <a href="Login.html"><small>← Back to Login</small></a>
            </div>

          </form>
        </div>

        <!-- VENDOR RESET -->
        <div class="tab-pane fade" id="vendorForgot">
          <form id="vendorForgotForm">

            <div class="mb-3">
              <label class="form-label"> Email</label>
              <input type="email" class="form-control" id="vendorEmail" placeholder="Enter registered email" required>
            </div>

            <div class="mb-3">
              <label class="form-label"> New Password</label>
              <input type="password" class="form-control" id="vendorNewPassword" placeholder="New password" required>
            </div>

            <div class="mb-3">
              <label class="form-label"> Confirm Password</label>
              <input type="password" class="form-control" id="vendorConfirmPassword" placeholder="Confirm new password" required>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold">Reset Password</button>

            <div class="mt-3 text-center">
              <a href="Login.html"><small>← Back to Login</small></a>
            </div>

          </form>
        </div>

      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/ForgotPassword.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
