server.port=${PORT:8080}
server.servlet.context-path=/

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/FarmFeed?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driverClassName=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# SQL initialization
spring.sql.init.mode=always

# Logging Configuration
logging.level.root=WARN
logging.level.com.example.farmFeed=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Application Configuration
spring.application.name=FarmFeed
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS Configuration (for React frontend)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.max-age=3600
